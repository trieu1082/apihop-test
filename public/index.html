<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>API HOP</title>
<style>
body{background:#0f0f0f;color:#fff;font-family:sans-serif}
.box{background:#1c1c1c;padding:15px;margin:10px;border-radius:10px}
input,button,textarea{margin:5px;padding:8px;border-radius:6px;border:none}
button{background:#5865f2;color:#fff;cursor:pointer}
pre{background:#000;padding:10px;border-radius:6px;max-height:200px;overflow:auto}
</style>
</head>
<body>

<div class="box">
<h3>create api</h3>
<input id="name" placeholder="name">
<button onclick="create()">Tạo</button>
<pre id="link"></pre>
</div>

<div class="box">
<h3>API của m</h3>
<button onclick="loadApis()">Load</button>
<pre id="list"></pre>
</div>

<div class="box">
<h3>Settings API</h3>
<input id="setName" placeholder="api name">
<textarea id="setMap" placeholder='{"1":"t"}'></textarea>
<input id="setTTL" placeholder="seconds vd 60">
<button onclick="saveSet()">Save</button>
</div>

<div class="box">
<h3>Check</h3>
<input id="viewName" placeholder="api name">
<button onclick="load()">Load</button>
<pre id="out"></pre>
</div>

<div class="box">
<h3>Owner</h3>
<input id="token" placeholder="owner token">
<button onclick="owner()">Load</button>
<pre id="own"></pre>
</div>

<script>
let cur=""

async function create(){
  let name=document.getElementById("name").value
  let r=await fetch("/create",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({name})})
  let j=await r.json()
  cur=name
  link.innerText=location.origin+j.api
}

async function loadApis(){
  let r=await fetch("/my")
  let j=await r.json()
  list.innerText=j.join("\n")
}

async function saveSet(){
  let name=setName.value
  let map=JSON.parse(setMap.value||"{}")
  let ttl=parseInt(setTTL.value)

  await fetch("/set",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({name,map,ttl})})
}

async function load(){
  let n=viewName.value
  let r=await fetch("/api/"+n)
  let j=await r.json()
  out.innerText=JSON.stringify(j,null,2)
}

async function owner(){
  let t=token.value
  let r=await fetch("/owner",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t})})
  let j=await r.json()
  own.innerText=JSON.stringify(j,null,2)
}
</script>

</body>
</html>
