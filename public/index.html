<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>API HOP</title>
<style>
body{background:#0f0f0f;color:#fff;font-family:sans-serif;font-size:16px}
.box{background:#1c1c1c;padding:20px;margin:15px;border-radius:12px}
input,button,textarea{margin:6px;padding:12px;border-radius:8px;border:none;font-size:15px}
textarea{width:100%;height:120px}
button{background:#5865f2;color:#fff;cursor:pointer}
pre{background:#000;padding:12px;border-radius:8px;max-height:250px;overflow:auto}
.top{position:fixed;top:10px;right:10px}
.apiBtn{display:block;width:100%;text-align:left;margin:5px 0;background:#2a2a2a}
.active{background:#3a3aff}
</style>
</head>
<body>

<div class="top">
<span id="me"></span>
<button onclick="showAuth()">⚙️</button>
</div>

<div class="box">
<h3>create api</h3>
<input id="name" placeholder="name">
<button onclick="create()">Tạo</button>
<pre id="link"></pre>
</div>

<div class="box">
<h3>API của m</h3>
<button onclick="loadApis()">Load</button>
<div id="list"></div>
</div>

<div class="box">
<h3>Settings API</h3>
<input id="setID" placeholder="api id">
<textarea id="setMap" placeholder="1 = a&#10;2 = b"></textarea>
<input id="setTTL" placeholder="seconds">
<button onclick="saveSet()">Save</button>
</div>

<div class="box">
<h3>Check</h3>
<input id="viewID" placeholder="api id">
<button onclick="load()">Load</button>
<pre id="out"></pre>
</div>

<div class="box" id="ownerBox" style="display:none">
<h3>OWNER</h3>
<button onclick="owner()">Load</button>
<pre id="own"></pre>
</div>

<div class="box" id="authBox" style="display:none">
<h3>Auth</h3>
<input id="user" placeholder="user">
<input id="pass" placeholder="pass">
<br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<pre id="authOut"></pre>
</div>

<script>
let token = localStorage.getItem("token") || ""
let role = localStorage.getItem("role") || ""
let currentAPI = null

const h = (url,opt={})=>fetch(url,{
  ...opt,
  headers:{'Content-Type':'application/json',authorization:token,...(opt.headers||{})}
}).then(r=>r.json())

function showAuth(){
  authBox.style.display = authBox.style.display=="none"?"block":"none"
}

function saveAuth(tk, rl){
  token=tk; role=rl
  localStorage.setItem("token",tk)
  localStorage.setItem("role",rl)
  ownerBox.style.display = rl=="owner"?"block":"none"
  loadMe()
}

function logout(){
  localStorage.clear()
  token=""; role=""
  ownerBox.style.display="none"
  loadMe()
}

async function loadMe(){
  let j=await h("/me",{method:"GET"})
  me.innerText=j.user||j.guest
}

async function register(){
  authOut.innerText=JSON.stringify(await h("/register",{method:"POST",body:JSON.stringify({
    user:user.value,pass:pass.value
  })}))
}

async function login(){
  let j=await h("/login",{method:"POST",body:JSON.stringify({
    user:user.value,pass:pass.value
  })})
  if(j.token){saveAuth(j.token,j.role);authOut.innerText="OK"}
  else authOut.innerText=JSON.stringify(j)
}

async function create(){
  let j=await h("/create",{method:"POST",body:JSON.stringify({name:name.value})})
  if(j.id){
    let full=location.origin+"/api/"+j.id
    link.innerHTML=`${full}
<button onclick="navigator.clipboard.writeText('${full}')">COPY</button>`
    loadApis()
  }else link.innerText=JSON.stringify(j)
}

async function loadApis(){
  let j=await h("/my")
  list.innerHTML=""
  j.forEach(a=>{
    let b=document.createElement("button")
    b.className="apiBtn"
    b.innerText=a.name+" | "+a.id
    b.onclick=()=>selectAPI(a,b)
    list.appendChild(b)
  })
}

function selectAPI(a,btn){
  [...list.children].forEach(b=>b.classList.remove("active"))
  btn.classList.add("active")

  currentAPI=a

  setID.value=a.id
  viewID.value=a.id

  setTTL.value = (a.ttl||60000)/1000

  if(a.encode){
    setMap.value = Object.entries(a.encode).map(([k,v])=>`${k} = ${v}`).join("\n")
  }else setMap.value=""

  load()
}

async function saveSet(){
  if(!setID.value) return alert("no id")

  let j=await h("/settings",{method:"POST",body:JSON.stringify({
    id:setID.value,
    encodeText:setMap.value,
    ttl:parseInt(setTTL.value||60)*1000
  })})

  alert(JSON.stringify(j))
  loadApis()
}

async function load(){
  if(!viewID.value) return
  let j=await fetch("/api/"+viewID.value).then(r=>r.json())
  out.innerText=JSON.stringify(j,null,2)
}

async function owner(){
  own.innerText=JSON.stringify(await h("/owner"),null,2)
}

if(role=="owner") ownerBox.style.display="block"
loadMe()
</script>

</body>
</html>
