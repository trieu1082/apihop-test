<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>API HOP</title>
<style>
body{background:#0f0f0f;color:#fff;font-family:sans-serif}
.box{background:#1c1c1c;padding:15px;margin:10px;border-radius:10px}
input,button,textarea{margin:5px;padding:8px;border-radius:6px;border:none}
button{background:#5865f2;color:#fff;cursor:pointer}
pre{background:#000;padding:10px;border-radius:6px;max-height:200px;overflow:auto}
.top{position:fixed;top:10px;right:10px}
</style>
</head>
<body>

<div class="top">
<button onclick="showAuth()">⚙️</button>
</div>

<div class="box">
<h3>create api</h3>
<input id="name" placeholder="name">
<button onclick="create()">Tạo</button>
<pre id="link"></pre>
</div>

<div class="box">
<h3>API của m</h3>
<button onclick="loadApis()">Load</button>
<pre id="list"></pre>
</div>

<div class="box">
<h3>Settings API</h3>
<input id="setName" placeholder="api name">
<textarea id="setMap" placeholder='{"1":"t"}'></textarea>
<input id="setTTL" placeholder="seconds vd 60">
<button onclick="saveSet()">Save</button>
</div>

<div class="box">
<h3>Check</h3>
<input id="viewName" placeholder="api name">
<button onclick="load()">Load</button>
<pre id="out"></pre>
</div>

<div class="box" id="ownerBox" style="display:none">
<h3>OWNER PANEL</h3>
<button onclick="owner()">Load</button>
<pre id="own"></pre>
</div>

<div class="box" id="authBox" style="display:none">
<h3>Auth</h3>
<input id="user" placeholder="user">
<input id="pass" placeholder="pass">
<br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<pre id="authOut"></pre>
</div>

<script>
let token = localStorage.getItem("token") || ""
let role = localStorage.getItem("role") || ""

function showAuth(){
  authBox.style.display = authBox.style.display=="none"?"block":"none"
}

function saveAuth(tk, rl){
  token = tk
  role = rl
  localStorage.setItem("token", tk)
  localStorage.setItem("role", rl)

  if(role=="owner") ownerBox.style.display="block"
}

function logout(){
  localStorage.clear()
  token=""
  role=""
  ownerBox.style.display="none"
}

async function register(){
  let r = await fetch("/register",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({
    user:user.value,pass:pass.value
  })})
  authOut.innerText = await r.text()
}

async function login(){
  let r = await fetch("/login",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({
    user:user.value,pass:pass.value
  })})
  let j = await r.json()
  if(j.token){
    saveAuth(j.token, j.role)
    authOut.innerText="OK"
  }else authOut.innerText=JSON.stringify(j)
}

async function create(){
  let name=document.getElementById("name").value

  let r=await fetch("/create",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({name})})
  let j=await r.json()

  if(j.link){
    let full = location.origin + j.link
    link.innerHTML = `
${full}
<button onclick="navigator.clipboard.writeText('${full}')">COPY</button>
`
  }else{
    link.innerText = JSON.stringify(j)
  }
}

async function loadApis(){
  let r=await fetch("/owner",{headers:{authorization:token}})
  let j=await r.json()

  if(role=="owner"){
    list.innerText = Object.keys(j.apis).join("\n")
  }else{
    list.innerText = "IP mode only (no list API)"
  }
}

async function saveSet(){
  let name=setName.value
  let encodeMap

  try{
    encodeMap = JSON.parse(setMap.value||"{}")
  }catch{
    return alert("map lỗi")
  }

  let ttl = parseInt(setTTL.value)*1000

  let r = await fetch("/settings",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,encodeMap,ttl})
  })

  alert(await r.text())
}

async function load(){
  let n=viewName.value
  let r=await fetch("/api/"+n)
  let j=await r.json()
  out.innerText=JSON.stringify(j,null,2)
}

async function owner(){
  let r=await fetch("/owner",{headers:{authorization:token}})
  let j=await r.json()
  own.innerText=JSON.stringify(j,null,2)
}

// auto load owner UI
if(role=="owner") ownerBox.style.display="block"
</script>

</body>
</html>
